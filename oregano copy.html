<script>

  // 1) Configure Judge.me
  window.jdgm = window.jdgm || {};
  window.jdgm.SHOP_DOMAIN = "99brands1.myshopify.com";
  window.jdgm.PLATFORM = "shopify";
  window.jdgm.PUBLIC_TOKEN = "Ol224LN84BU5YZ8InSpr9XVXA34";

  // 2) Helper: wait for an element (React hydration-safe)
  function waitForEl(selector, timeoutMs) {

    timeoutMs = timeoutMs || 10000;
    var start = Date.now();

    return new Promise(function (resolve, reject) {

      (function tick() {

        var el = document.querySelector(selector);

        if (el) return resolve(el);

        if (Date.now() - start > timeoutMs) {
          return reject(new Error("Timeout: " + selector));
        }

        setTimeout(tick, 100);

      })();

    });
  }

  // 3) Load Judge.me script once (if not already loaded)
  function loadJdgm() {

    return new Promise(function (resolve) {

      var existing = document.querySelector(
        'script[src*="judge.me/widget_preloader.js"]'
      );

      if (existing) return resolve();

      var s = document.createElement("script");
      s.src = "https://cdnwidget.judge.me/widget_preloader.js";
      s.async = true;
      s.setAttribute("data-cfasync", "false");

      s.onload = function () {
        resolve();
      };

      document.body.appendChild(s);

    });
  }

  // 4) Render/refresh once the container exists
  function renderJdgm() {

    if (!window.jdgm) return;

    // Judge.me exposes one of these depending on version/config.
    if (typeof window.jdgm.refreshWidgets === "function") {
      window.jdgm.refreshWidgets();
    }

    if (typeof window.jdgm.renderWidgets === "function") {
      window.jdgm.renderWidgets();
    }

  }

  // Run after load + after React has mounted the widget container
  window.addEventListener("load", function () {

    Promise.all([
      loadJdgm(),
      waitForEl(".jdgm-widget", 15000) // adjust selector if you use a different container class
    ])
      .then(function () {

        // Give React a beat to finish any last render work
        setTimeout(renderJdgm, 100);

      })
      .catch(function () {

        // Optional: silence; or console.log for debugging

      });

  });

</script>

<script>
(function(){

  function ensureMainLandmark(){

    const root = document.getElementById("root");

    if(!root) return;

    if(root.querySelector("main,[role='main']")) return;

    const first = Array.from(root.children).find(
      el => el.tagName !== "SCRIPT" && el.tagName !== "STYLE"
    );

    if(first)
      first.setAttribute("role","main");

  }

  window.addEventListener("load",ensureMainLandmark);

})();
</script>
