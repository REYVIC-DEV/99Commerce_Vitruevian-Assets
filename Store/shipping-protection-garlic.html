<style>
  /* =========================================
   SHIPPING PROTECTION TOGGLE (Lightfunnels Safe)
   ========================================= */

  /* 1️⃣ Hide native checkbox but keep functionality */
  .shipping-protection-cont input[type="checkbox"] {
    position: absolute;
    opacity: 0;
    width: 0;
    height: 0;
  }

  /* 2️⃣ Reset any existing Lightfunnels checkbox visuals */
  .shipping-protection-cont input[type="checkbox"] + span {
    background-image: none !important;
    -webkit-mask-image: none !important;
    mask-image: none !important;
    border: 1px solid #ddddddbe !important;
    box-shadow: none !important;
    font-size: 0 !important;
    line-height: 0 !important;
    overflow: hidden;

    /* Toggle track */
    position: relative;
    display: inline-block;
    width: 44px;
    height: 24px;
    background: #ddd;
    border-radius: 999px;
    cursor: pointer;
    transition: background 0.25s ease;
    vertical-align: middle;
  }

  /* 3️⃣ Remove any checkmark pseudo elements LF injects */
  .shipping-protection-cont input[type="checkbox"] + span::after {
    content: none !important;
    display: none !important;
  }

  /* 4️⃣ Toggle knob */
  .shipping-protection-cont input[type="checkbox"] + span::before {
    content: "" !important;
    position: absolute;
    width: 18px;
    height: 18px;
    left: 3px;
    top: 2px;
    background: #fff;
    border-radius: 999px;
    transition: transform 0.25s ease;
    box-shadow: 0 2px 6px rgba(0, 0, 0, 0.2);
  }

  /* 5️⃣ Checked state */
  .shipping-protection-cont input[type="checkbox"]:checked + span {
    background: #d87e7e;
  }

  .shipping-protection-cont input[type="checkbox"]:checked + span::before {
    transform: translateX(20px);
  }

  /* 6️⃣ Focus accessibility */
  .shipping-protection-cont input[type="checkbox"]:focus-visible + span {
    outline: 2px solid rgba(34, 197, 94, 0.6);
    outline-offset: 2px;
  }

  /* 7️⃣ Safety: if LF injects children inside the span, hide them */
  .shipping-protection-cont input[type="checkbox"] + span * {
    display: none !important;
  }
</style>
