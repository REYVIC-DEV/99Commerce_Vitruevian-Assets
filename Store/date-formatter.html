<script>
(function () {
  /* ============================
     CONFIG — edit these easily
  ============================ */
  const TARGET_CLASSES = [
    "delivary-date-estimate",
    "delivary-date-estimate-2"
  ];

  // Color can be:
  // 1) single string: "#a03f3f"
  // 2) array aligned with TARGET_CLASSES: ["#a03f3f", "#1e7642"]
  // 3) map by class name: { "delivary-date-estimate": "#a03f3f", "delivary-date-estimate-2": "#1e7642" }
  const DATE_COLOR = ["#000000", "#084D3A"];

  /* ============================
     Utilities
  ============================ */
  function getOrdinal(day) {
    if (day > 3 && day < 21) return day + "th";
    switch (day % 10) {
      case 1: return day + "st";
      case 2: return day + "nd";
      case 3: return day + "rd";
      default: return day + "th";
    }
  }

  function getNextWeekDate() {
    const d = new Date();
    d.setDate(d.getDate() + 7);
    const month = d.toLocaleString("en-US", { month: "long" });
    const day = getOrdinal(d.getDate());
    return `${month} ${day}`;
  }

  function isElement(node) {
    return node && node.nodeType === 1;
  }

  function getColorForElement(el) {
    // Single color
    if (typeof DATE_COLOR === "string") return DATE_COLOR;

    // Array aligned with TARGET_CLASSES
    if (Array.isArray(DATE_COLOR)) {
      for (let i = 0; i < TARGET_CLASSES.length; i++) {
        const cls = TARGET_CLASSES[i];
        if (el.classList && el.classList.contains(cls)) {
          return DATE_COLOR[i] || DATE_COLOR[0] || "#a03f3f";
        }
      }
      return DATE_COLOR[0] || "#a03f3f";
    }

    // Map by class name
    if (DATE_COLOR && typeof DATE_COLOR === "object") {
      for (let i = 0; i < TARGET_CLASSES.length; i++) {
        const cls = TARGET_CLASSES[i];
        if (el.classList && el.classList.contains(cls)) {
          return DATE_COLOR[cls] || DATE_COLOR.default || "#a03f3f";
        }
      }
      return DATE_COLOR.default || "#a03f3f";
    }

    return "#a03f3f";
  }

  function matchesAnyTarget(el) {
    for (let i = 0; i < TARGET_CLASSES.length; i++) {
      if (el.classList && el.classList.contains(TARGET_CLASSES[i])) return true;
    }
    return false;
  }

  function findTargetsWithin(root) {
    const found = [];
    if (!isElement(root)) return found;

    if (matchesAnyTarget(root)) found.push(root);

    for (let i = 0; i < TARGET_CLASSES.length; i++) {
      const cls = TARGET_CLASSES[i];
      root.querySelectorAll("." + cls).forEach(el => found.push(el));
    }
    return found;
  }

  function updateElement(el) {
    if (!isElement(el)) return;

    // Prevent re-writing endlessly
    if (el.dataset.lfDeliveryUpdated === "1") return;

    const contentEl = el.firstElementChild; // avoids .wys temp class
    if (!contentEl) return;

    const newDate = getNextWeekDate();
    const color = getColorForElement(el);

    contentEl.innerHTML =
      'Order now for delivery by: ' +
      '<u><b><font color="' + color + '">' + newDate + '</font></b></u>';

    el.dataset.lfDeliveryUpdated = "1";
  }

  function updateAllExisting() {
    TARGET_CLASSES.forEach(cls => {
      document.querySelectorAll("." + cls).forEach(updateElement);
    });
  }

  /* ============================
     Observer (debounced + only new nodes)
  ============================ */
  let scheduled = false;
  const pending = new Set();

  function scheduleFlush() {
    if (scheduled) return;
    scheduled = true;

    setTimeout(function () {
      scheduled = false;
      pending.forEach(updateElement);
      pending.clear();
    }, 50);
  }

  function onMutations(mutations) {
    for (let m = 0; m < mutations.length; m++) {
      const mut = mutations[m];
      if (!mut.addedNodes || mut.addedNodes.length === 0) continue;

      mut.addedNodes.forEach(node => {
        if (!isElement(node)) return;

        const targets = findTargetsWithin(node);
        for (let i = 0; i < targets.length; i++) {
          pending.add(targets[i]);
        }
      });
    }

    if (pending.size) scheduleFlush();
  }

  function init() {
    updateAllExisting();

    const observer = new MutationObserver(onMutations);
    observer.observe(document.body, { childList: true, subtree: true });
  }

  if (document.readyState === "loading") {
    document.addEventListener("DOMContentLoaded", init);
  } else {
    init();
  }
})();
</script>
