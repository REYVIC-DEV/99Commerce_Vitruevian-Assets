<style>
  .pdp-slider-vid .swiper-slide {
    width: 215px !important;
    border-radius: 10px;
    overflow: hidden;
    position: relative; /* needed for overlay button */
  }

  .pdp-slider-vid .lf-hls-video {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }

  /* Overlay play button */
  .pdp-slider-vid .swiper-slide .play-button-pdp {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    z-index: 5;
    cursor: pointer;
    user-select: none;
  }

  /* optional: prevent button from affecting layout */
  .pdp-slider-vid .swiper-slide .play-button-pdp[hidden] {
    display: none !important;
  }

  .pdp-slider-vid-pagination {
    display: flex !important;
    justify-content: center !important;
    width: 50px !important;
  }
  .pdp-slider-vid-pagination .swiper-pagination-progressbar-fill {
    background-color: #A03F3F !important;
    
  }
  

  @media (max-width: 1023px) {
    .pdp-slider-vid-pagination {
      display: none !important;
    }
  }
  @media (max-width: 768px) {
  }
  @media (max-width: 425px) {
  }
  @media (max-width: 320px) {
  }
</style>

<script>
  function initPdpSliderVid() {
    const el = document.querySelector(".pdp-slider-vid");
    if (!el || el.classList.contains("swiper-initialized")) return;

    // eslint-disable-next-line no-undef
    const swiper = new Swiper(el, {
      speed: 400,
      spaceBetween: 9,
      slidesPerView: "auto",
      watchOverflow: true,
      loop: true,
      centerInsufficientSlides: true,
      centeredSlidesBounds: true,
      observer: true,
      observeParents: true,
      pagination: {
        el: ".pdp-slider-vid-pagination",
        type: "progressbar",
        clickable: true,
      },
      on: {
        slideChangeTransitionStart() {
          // Pause all videos when slide changes (prevents multiple audio streams)
          document
            .querySelectorAll(".pdp-slider-vid video.lf-hls-video")
            .forEach((v) => {
              try {
                v.pause();
              } catch (e) {}
            });
        },
      },
    });

    // store if you want later: el._pdpSwiper = swiper;
  }

  document.addEventListener("DOMContentLoaded", function () {
    setTimeout(initPdpSliderVid, 300);
  });

  const pdpSliderVidObserver = new MutationObserver(function () {
    initPdpSliderVid();
  });

  pdpSliderVidObserver.observe(document.body, {
    childList: true,
    subtree: true,
  });
</script>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<script>
(() => {
  const SLIDE_SELECTOR = ".pdp-slider-vid .swiper-slide";
  const IFRAME_SELECTOR = "iframe";
  const VIDEO_CLASS = "lf-hls-video";
  const PROCESSED_ATTR = "data-hls-processed";
  const BTN_SELECTOR = ".play-button-pdp";

  const PRECONNECT_ATTR = "data-lf-preconnect-cfstream-1";

  // Track currently playing video (within this slider)
  let currentPlaying = null;

  const log = (...a) => console.log("[LF-HLS]", ...a);

  function ensurePreconnect(originUrl) {
    try {
      const root = document.documentElement;
      if (root.getAttribute(PRECONNECT_ATTR) === "1") return;
      root.setAttribute(PRECONNECT_ATTR, "1");

      const u = new URL(originUrl);
      const origin = u.origin;

      const add = (rel, href, cross) => {
        if (document.head.querySelector(`link[rel="${rel}"][href="${href}"]`))
          return;
        const link = document.createElement("link");
        link.rel = rel;
        link.href = href;
        if (cross) link.crossOrigin = "anonymous";
        document.head.appendChild(link);
      };

      add("preconnect", origin, true);
      add("dns-prefetch", origin, false);
      log("Preconnect injected:", origin);
    } catch (e) {}
  }

  function isCloudflareStreamIframe(urlStr) {
    try {
      const u = new URL(urlStr);
      // Keep strict host check (your original)
      return (
        u.hostname.endsWith("cloudflarestream.com") &&
        u.pathname.includes("/iframe")
      );
    } catch {
      return false;
    }
  }

  function cloudflareToIds(urlStr) {
    const u = new URL(urlStr);
    const parts = u.pathname.split("/").filter(Boolean); // /<videoId>/iframe
    const videoId = parts[0];
    return { videoId, origin: u.origin };
  }

  function hlsUrlFor(origin, videoId) {
    return `${origin}/${videoId}/manifest/video.m3u8`;
  }

  function posterUrlFor(origin, videoId) {
    // Common Cloudflare Stream thumbnail endpoint
    return `${origin}/${videoId}/thumbnails/thumbnail.jpg?time=1s`;
  }

  function setControlsVisible(video, visible) {
    if (visible) video.setAttribute("controls", "");
    else video.removeAttribute("controls");
  }

  function showBtn(btn) {
    if (!btn) return;
    btn.hidden = false;
    btn.style.display = "";
    btn.style.pointerEvents = "auto";
    btn.style.opacity = "1";
  }

  function hideBtn(btn) {
    if (!btn) return;
    btn.hidden = true;
    btn.style.pointerEvents = "none";
    btn.style.opacity = "0";
  }

  function pauseOtherIfNeeded(video) {
    if (currentPlaying && currentPlaying !== video) {
      try {
        if (!currentPlaying.paused && !currentPlaying.ended) {
          log("Pausing previous playing video");
          currentPlaying.pause();
        }
      } catch (e) {}
    }
  }

  function canNativeHls(videoEl) {
    return (
      !!videoEl.canPlayType("application/vnd.apple.mpegurl") ||
      !!videoEl.canPlayType("application/x-mpegURL")
    );
  }

  // Lazy attach HLS only when needed (click / active slide)
  function initHlsIfNeeded(videoEl, hlsUrl, videoId) {
    if (videoEl._hlsInstance || videoEl.dataset.hlsAttached === "1") return;

    const native = canNativeHls(videoEl);
    log("Init (lazy) video", { videoId, hlsUrl, nativeHls: !!native });

    if (native) {
      if (videoEl.src !== hlsUrl) videoEl.src = hlsUrl;
      videoEl.dataset.hlsAttached = "1";
      return;
    }

    if (!window.Hls || !window.Hls.isSupported()) {
      log("Hls.js not supported in this browser.", videoEl);
      return;
    }

    const hls = new Hls({
      enableWorker: true,
      lowLatencyMode: false,

      // Faster startup tuning
      startLevel: 0,
      autoStartLoad: true,
      maxBufferLength: 10,
      maxMaxBufferLength: 30,
      backBufferLength: 0,
      manifestLoadingTimeOut: 10000,
      levelLoadingTimeOut: 10000,
    });

    hls.loadSource(hlsUrl);
    hls.attachMedia(videoEl);

    hls.on(Hls.Events.ERROR, (event, data) => {
      log("HLS error", { videoId, event, data });
    });

    videoEl._hlsInstance = hls;
    videoEl.dataset.hlsAttached = "1";
  }

  function wirePlayButton(slide, video) {
    const btn = slide.querySelector(BTN_SELECTOR);

    // Initial UI (paused)
    setControlsVisible(video, false);
    showBtn(btn);

    if (video.dataset.btnWired === "1") return;
    video.dataset.btnWired = "1";

    const ensureReadyThenPlay = async () => {
      pauseOtherIfNeeded(video);

      const hlsUrl = video.dataset.hlsUrl;
      const videoId = video.dataset.videoId;
      if (hlsUrl && videoId) initHlsIfNeeded(video, hlsUrl, videoId);

      try {
        await video.play();
      } catch (e) {
        log("play failed (gesture/autoplay?)", e);
      }
    };

    const toggle = async () => {
      try {
        if (video.paused || video.ended) {
          await ensureReadyThenPlay();
        } else {
          video.pause();
        }
      } catch (e) {
        log("toggle failed", e);
      }
    };

    if (btn && btn.dataset.listenerAttached !== "1") {
      btn.addEventListener("click", (e) => {
        e.preventDefault();
        e.stopPropagation();
        toggle();
      });
      btn.dataset.listenerAttached = "1";
    }

    // Click-to-play only when paused (controls hidden)
    if (video.dataset.videoClickAttached !== "1") {
      video.addEventListener("click", () => {
        const controlsVisible = video.hasAttribute("controls");
        if (controlsVisible) return;
        toggle();
      });
      video.dataset.videoClickAttached = "1";
    }

    // Enforce exclusivity even if play happens via native controls
    video.addEventListener("play", () => {
      pauseOtherIfNeeded(video);
      currentPlaying = video;

      hideBtn(slide.querySelector(BTN_SELECTOR));
      setControlsVisible(video, true);
    });

    video.addEventListener("pause", () => {
      showBtn(slide.querySelector(BTN_SELECTOR));
      setControlsVisible(video, false);

      if (currentPlaying === video) currentPlaying = null;
    });

    video.addEventListener("ended", () => {
      showBtn(slide.querySelector(BTN_SELECTOR));
      setControlsVisible(video, false);

      if (currentPlaying === video) currentPlaying = null;
    });

    const refreshUI = () => {
      const freshBtn = slide.querySelector(BTN_SELECTOR);
      if (video.paused || video.ended) {
        setControlsVisible(video, false);
        showBtn(freshBtn);
      } else {
        setControlsVisible(video, true);
        hideBtn(freshBtn);
      }
    };

    const localObs = new MutationObserver(() => refreshUI());
    localObs.observe(slide, { childList: true, subtree: true });
    video._btnObserver = localObs;

    refreshUI();
  }

  function ensureVideoInSlide(slide, origin, videoId) {
    if (slide.getAttribute(PROCESSED_ATTR) === "1") return;

    const hlsUrl = hlsUrlFor(origin, videoId);
    const posterUrl = posterUrlFor(origin, videoId);

    let video = slide.querySelector(`video.${VIDEO_CLASS}`);
    if (!video) {
      video = document.createElement("video");
      video.className = VIDEO_CLASS;
      video.setAttribute("playsinline", "");
      video.muted = false;

      // Default; we’ll upgrade active slide to auto
      video.setAttribute("preload", "metadata");

      // Fast paint
      video.setAttribute("poster", posterUrl);

      video.style.width = "100%";
      video.style.height = "100%";
      slide.prepend(video);
    } else {
      if (!video.getAttribute("poster")) video.setAttribute("poster", posterUrl);
    }

    // Store for lazy init
    video.dataset.hlsUrl = hlsUrl;
    video.dataset.videoId = videoId;

    setControlsVisible(video, false);

    // Wire play logic (lazy init happens on click)
    wirePlayButton(slide, video);

    slide.setAttribute(PROCESSED_ATTR, "1");
  }

  function setPreloadForVisibleSlides() {
    const slider = document.querySelector(".pdp-slider-vid");
    if (!slider) return;

    const active =
      slider.querySelector(".swiper-slide-active") ||
      slider.querySelector(SLIDE_SELECTOR);

    slider.querySelectorAll(SLIDE_SELECTOR).forEach((slide) => {
      const video = slide.querySelector(`video.${VIDEO_CLASS}`);
      if (!video) return;

      const isPriority = slide === active;
      video.setAttribute("preload", isPriority ? "auto" : "metadata");

      // Optional: attach HLS for active slide (next frame = smoother paint)
      if (isPriority) {
        const hlsUrl = video.dataset.hlsUrl;
        const videoId = video.dataset.videoId;
        if (hlsUrl && videoId) {
          requestAnimationFrame(() =>
            initHlsIfNeeded(video, hlsUrl, videoId)
          );
        }
      }
    });
  }

  function processSlides(root = document) {
    const slides = root.querySelectorAll(SLIDE_SELECTOR);
    if (!slides.length) return;

    slides.forEach((slide) => {
      if (slide.getAttribute(PROCESSED_ATTR) === "1") {
        const video = slide.querySelector(`video.${VIDEO_CLASS}`);
        if (video) wirePlayButton(slide, video);
        return;
      }

      const iframe = slide.querySelector(IFRAME_SELECTOR);
      if (!iframe) return;

      const src = iframe.getAttribute("src") || "";
      if (!isCloudflareStreamIframe(src)) return;

      const { videoId, origin } = cloudflareToIds(src);
      const hls = hlsUrlFor(origin, videoId);

      log("Found Cloudflare iframe in slide", { videoId, src, hls });

      ensurePreconnect(origin);

      // Insert video + poster first (fast paint), then remove iframe next frame
      ensureVideoInSlide(slide, origin, videoId);

      iframe.style.display = "none";
      requestAnimationFrame(() => {
        try {
          iframe.remove();
        } catch (e) {}
      });
    });

    setPreloadForVisibleSlides();
  }

  if (document.readyState === "loading") {
    document.addEventListener("DOMContentLoaded", () => processSlides());
  } else {
    processSlides();
  }

  const obs = new MutationObserver((mutations) => {
    const relevant = mutations.some((m) =>
      [...m.addedNodes].some(
        (n) =>
          n.nodeType === 1 &&
          (n.matches?.(SLIDE_SELECTOR) ||
            n.querySelector?.(SLIDE_SELECTOR) ||
            n.matches?.("iframe") ||
            n.querySelector?.("iframe") ||
            n.matches?.(BTN_SELECTOR) ||
            n.querySelector?.(BTN_SELECTOR))
      )
    );
    if (relevant) processSlides();
  });

  obs.observe(document.documentElement, { childList: true, subtree: true });

  // Hook your Swiper instance (from your init script) if it exists,
  // to update preload strategy on slide changes.
  const hookSwiper = () => {
    const slider = document.querySelector(".pdp-slider-vid");
    if (!slider) return;
    const sw = slider._pdpSwiper; // your init script said you could store it; let's support it if you do
    if (!sw || sw._lfHooked) return;

    sw._lfHooked = true;
    sw.on("slideChangeTransitionStart", () => {
      // Keep your "pause all videos"
      document
        .querySelectorAll(".pdp-slider-vid video.lf-hls-video")
        .forEach((v) => {
          try {
            v.pause();
          } catch (e) {}
        });

      setPreloadForVisibleSlides();
    });
  };

  hookSwiper();
  const swHookObs = new MutationObserver(() => hookSwiper());
  swHookObs.observe(document.body, { childList: true, subtree: true });

  log("Observer attached (lazy HLS + poster + preconnect)");
})();
</script>
