<style>
  #the-bundles .active,
  #the-bundles-2 .active{
    background: #E0F9EB !important;
  }
  /* hide native radio UI */
  [data-lf-hide="radio"] { display: none !important; }

  [data-lf-processed="1"] {
    flex-wrap: nowrap !important;
  }

  /* icon */
  [data-lf-icon]{
    height: 57px;
    display: inline-block;
    margin-right: 10px;
    flex: 0 0 auto;
    max-width: 74px;
  }

  /* title column */
  [data-lf-titlewrap]{
    display: flex;
    flex-direction: column;
    color: #000000;
  }

  /* title row = title + percent-off badge */
  [data-lf-title-row]{
    display: flex;
    align-items: center;
    gap: 6px;
  }

  [data-lf-title]{
    line-height: 21px !important;
    letter-spacing: 0% !important;
    font-size: 15.3px !important;
    font-weight: 700 !important;
  }

  /* percent off badge */
  [data-lf-percent-off]{
    background: #E0F9EB;
    border-radius: 2.07px;
    height: 17px;
    color: #09662F;
    padding: 0 5.5px;
    display: inline-flex;
    align-items: center;
    white-space: nowrap;
    font-size: 12px;
    line-height: 17px;
    font-weight: 700;
  }

  [data-lf-subtitle]{
    margin-top: 5.5px !important;
    font-size: 15.2px !important;
    line-height: 21px !important;
    font-weight: 400 !important;
  }

  @media (max-width: 425px) {
    [data-lf-titlewrap]{
      max-width: 145px !important;
    }
    [data-lf-title],[data-lf-subtitle]{
      font-size: 12px !important;
    }
    [data-lf-title]{
      line-height: 19px !important;
    }
    [data-lf-subtitle]{
      line-height: 17px !important;
      margin-top: 4px !important;
    }
    [data-lf-percent-off]{
      font-size: 10.5px;
      height: 16px;
      line-height: 16px;
      padding: 0 5px;
    }
  }
</style>

<script>
(function () {

  const BUNDLE_ROOTS = ["the-bundles", "the-bundles-2"];

  const ICONS = {
    "1-Person Protocol Bag":
      "https://assets.lightfunnels.com/account-90380/images_library/64a8f9d1-eb12-40b5-b197-7b590bdb20de.430250701640ec432ae870fc1363bd81a46c6215.png",
    "2-Person Home Protocol Bundle":
      "https://assets.lightfunnels.com/account-90380/images_library/3fe63436-309b-496e-ab1e-4c29a98b8b0c.523660691170cf7b9214f4273353e8d125b824f2.png",
    "Family Bundle (4pack)":
      "https://assets.lightfunnels.com/account-90380/images_library/a5a21d42-cfe1-41b5-8c02-6dad4c87e3cb.23514ef644c592949a62f84a5344138c1e80e031.png",
  };

  const SUBTITLES = {
    "1-Person Protocol Bag": "2 Parasite Reset Protocols for 1 person.",
    "2-Person Home Protocol Bundle": "2 full protocols each for 2 adults.",
    "Family Bundle (4pack)": "Up to 8 full parasite protocols per household.",
  };

  const PERCENT_OFF = {
    "1-Person Protocol Bag": "30% OFF",
    "2-Person Home Protocol Bundle": "40% OFF",
    "Family Bundle (4pack)": "50% OFF",
  };

  function norm(s){
    return (s || "")
      .replace(/\u2011|\u2013|\u2014/g, "-")
      .replace(/\s+/g, " ")
      .trim();
  }

  // ---------- Lazy loader ----------
  const IO_SUPPORTED = "IntersectionObserver" in window;
  const lazyQueue = new Set();
  let io = null;

  function ensureIO(){
    if (!IO_SUPPORTED || io) return;
    io = new IntersectionObserver((entries) => {
      entries.forEach((entry) => {
        if (!entry.isIntersecting) return;
        const img = entry.target;
        const src = img.getAttribute("data-src");
        if (src && !img.src) img.src = src;
        img.removeAttribute("data-src");
        io.unobserve(img);
        lazyQueue.delete(img);
      });
    }, { root: null, rootMargin: "250px 0px", threshold: 0.01 });
  }

  function registerLazy(img, src){
    // Native hints
    img.loading = "lazy";
    img.decoding = "async";
    img.setAttribute("fetchpriority", "low");

    // True lazy: only set src when near viewport
    img.removeAttribute("src");
    img.setAttribute("data-src", src);

    if (IO_SUPPORTED) {
      ensureIO();
      lazyQueue.add(img);
      io.observe(img);
    } else {
      // Fallback: just set src (still benefits from loading="lazy" in many browsers)
      img.src = src;
      img.removeAttribute("data-src");
    }
  }
  // --------------------------------

  function enhanceContainer(container){
    if (!container) return;

    const titleSpans = container.querySelectorAll("span.n0NQf");

    titleSpans.forEach((titleSpan) => {
      const row = titleSpan.parentElement;
      if (!row) return;
      if (row.dataset.lfProcessed === "1") return;

      const titleText = norm(titleSpan.textContent);
      const iconSrc = ICONS[titleText];
      const subtitleText = SUBTITLES[titleText] || "";
      const percentText = (PERCENT_OFF[titleText] || "").trim();

      row.dataset.lfProcessed = "1";

      // Hide native radio
      const prev = titleSpan.previousElementSibling;
      if (prev) prev.setAttribute("data-lf-hide", "radio");

      // Insert icon (lazy)
      if (iconSrc) {
        const img = document.createElement("img");
        img.setAttribute("data-lf-icon", "1");
        img.alt = titleText + " icon";

        // Lazy-load assignment happens here
        registerLazy(img, iconSrc);

        row.insertBefore(img, titleSpan);
      }

      // Create title column
      const wrap = document.createElement("div");
      wrap.setAttribute("data-lf-titlewrap", "1");

      const titleRow = document.createElement("div");
      titleRow.setAttribute("data-lf-title-row", "1");

      const t = document.createElement("span");
      t.setAttribute("data-lf-title", "1");
      t.textContent = titleText;
      titleRow.appendChild(t);

      if (percentText) {
        const p = document.createElement("span");
        p.setAttribute("data-lf-percent-off", "1");
        p.textContent = percentText;
        titleRow.appendChild(p);
      }

      const s = document.createElement("span");
      s.setAttribute("data-lf-subtitle", "1");
      s.textContent = subtitleText;

      wrap.appendChild(titleRow);
      wrap.appendChild(s);

      titleSpan.replaceWith(wrap);

      // Ensure horizontal layout
      const cs = window.getComputedStyle(row);
      if (cs.display !== "flex") {
        row.style.display = "flex";
        row.style.alignItems = "center";
      }
    });
  }

  function enhanceAll(){
    BUNDLE_ROOTS.forEach(id => {
      const el = document.getElementById(id);
      if (el) enhanceContainer(el);
    });
  }

  function schedule(){
    clearTimeout(window.__lfBundlesTO);
    window.__lfBundlesTO = setTimeout(enhanceAll, 50);
  }

  if (document.readyState === "loading") {
    document.addEventListener("DOMContentLoaded", schedule);
  } else {
    schedule();
  }

  const observer = new MutationObserver(schedule);
  observer.observe(document.documentElement, { subtree: true, childList: true });

})();
</script>
