<script>
(function () {

  const SOURCE_SELECTOR = ".shipping-protection-cont input[type='checkbox']";
  const TARGET_SELECTOR = ".shipping-protection input[type='checkbox']";
  const HOMEPAGE_SELECTOR = "#homepage";
  const CART_TOTAL_SELECTOR = "#cart-total-num";
  const ITEM_PRICE_SELECTOR = ".item-price";

  const STORAGE_KEY = "lf_shipping_protection_choice";
  const BASE_PROTECTION_PRICE = 2.95;

  const RATE_CACHE_KEY = "lf_currency_cache";

  let bindTimeout = null;

  function getRate() {
    try {
      const data = JSON.parse(localStorage.getItem(RATE_CACHE_KEY));
      if (!data || !data.rate) return 1;
      return data.rate;
    } catch {
      return 1;
    }
  }

  function getProtectionPrice() {
    const rate = getRate();
    return BASE_PROTECTION_PRICE * rate;
  }

  function parseMoney(text) {
    const match = (text || "").match(/[\d,.]+/);
    if (!match) return null;
    return parseFloat(match[0].replace(/,/g, ""));
  }

  function formatMoney(value, prefix) {
    return `${prefix}${value.toFixed(2)}`;
  }

  function getStored() {
    const v = localStorage.getItem(STORAGE_KEY);
    return (v === "1" || v === "0") ? v : null;
  }

  function setStored(val) {
    localStorage.setItem(STORAGE_KEY, val ? "1" : "0");
  }

  function computeItemsTotal() {
    const nodes = document.querySelectorAll(ITEM_PRICE_SELECTOR);
    if (!nodes.length) return null;

    let sum = 0;
    let found = false;

    nodes.forEach(node => {
      const v = parseMoney(node.textContent);
      if (Number.isFinite(v)) {
        sum += v;
        found = true;
      }
    });

    return found ? sum : null;
  }

  function updateHomepageTotal() {

    if (!document.querySelector(HOMEPAGE_SELECTOR)) return;

    const totalEl = document.querySelector(CART_TOTAL_SELECTOR);
    if (!totalEl) return;

    const itemsTotal = computeItemsTotal();

    if (itemsTotal === null) {
      setStored(true);
      return;
    }

    const prefix =
      (totalEl.textContent.match(/^\s*[^0-9]+/)?.[0] || "$").trim() || "$";

    const stored = getStored() ?? "1";

    const protectionPrice = getProtectionPrice();

    const finalTotal =
      stored === "1"
        ? itemsTotal + protectionPrice
        : itemsTotal;

    totalEl.textContent = formatMoney(finalTotal, prefix);
  }

  function bind() {

    const source = document.querySelector(SOURCE_SELECTOR);
    if (!source) return;

    if (!source.dataset.bound) {

      source.dataset.bound = "1";

      const stored = getStored();

      if (stored !== null) {
        source.checked = stored === "1";
      } else {
        setStored(source.checked);
      }

      source.addEventListener("change", function () {

        setStored(source.checked);

        updateHomepageTotal();

        const target = document.querySelector(TARGET_SELECTOR);
        if (target && target.checked !== source.checked) {
          target.click();
        }

      });

    }

    updateHomepageTotal();

  }

  function delayedBind() {
    clearTimeout(bindTimeout);
    bindTimeout = setTimeout(bind, 150);
  }

  document.addEventListener("DOMContentLoaded", delayedBind);

  document.body.addEventListener("click", delayedBind, true);

  const observer = new MutationObserver(delayedBind);
  observer.observe(document.body, { childList: true, subtree: true });

})();
</script>
