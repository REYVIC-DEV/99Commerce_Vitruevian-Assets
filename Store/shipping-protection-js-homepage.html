<script>
(function () {
  const SOURCE_SELECTOR = ".shipping-protection-cont input[type='checkbox']";
  const TARGET_SELECTOR = ".shipping-protection input[type='checkbox']";

  const HOMEPAGE_SELECTOR = "#homepage";
  const CART_TOTAL_SELECTOR = "#cart-total-num";
  const ITEM_PRICE_SELECTOR = ".item-price";

  const STORAGE_KEY = "lf_shipping_protection_choice"; // "1" or "0"
  const PROTECTION_PRICE = 2.95;

  let syncing = false;
  let timer = null;

  function getStored() {
    const v = localStorage.getItem(STORAGE_KEY);
    return (v === "1" || v === "0") ? v : null;
  }

  function setStored01(v01) {
    localStorage.setItem(STORAGE_KEY, v01);
  }

  function setStoredFromBool(val) {
    setStored01(val ? "1" : "0");
  }

  function getSource() {
    const all = [...document.querySelectorAll(SOURCE_SELECTOR)];
    return all.find(el => !el.disabled && el.offsetParent !== null) || all[0] || null;
  }

  function getTarget() {
    const all = [...document.querySelectorAll(TARGET_SELECTOR)];
    return all.find(el => !el.disabled && el.offsetParent !== null) || all[0] || null;
  }

  function parseMoneyFromText(text) {
    // Finds first number like 29.99 or 1,234.56 in the text
    const m = (text || "").match(/(\d{1,3}(?:,\d{3})*|\d+)(?:\.\d{1,2})?/);
    if (!m) return null;
    const val = parseFloat(m[0].replace(/,/g, ""));
    return Number.isFinite(val) ? val : null;
  }

  function formatMoney(value, prefix) {
    const v = Math.round(value * 100) / 100;
    return `${prefix}${v.toFixed(2)}`;
  }

  function computeItemsTotal() {
    const nodes = Array.from(document.querySelectorAll(ITEM_PRICE_SELECTOR));
    if (!nodes.length) return null;

    let sum = 0;
    let found = false;

    for (const node of nodes) {
      const v = parseMoneyFromText(node.textContent);
      if (v !== null) {
        sum += v;
        found = true;
      }
    }

    return found ? sum : null;
  }

  function updateHomepageCartNum() {
    if (!document.querySelector(HOMEPAGE_SELECTOR)) return;

    const itemsTotal = computeItemsTotal();

    // Cart empty: set storage to 1 and do nothing
    if (itemsTotal === null) {
      setStored01("1");
      return;
    }

    const totalEl = document.querySelector(CART_TOTAL_SELECTOR);
    if (!totalEl) return;

    const prefix =
      (totalEl.textContent.match(/^\s*[^0-9]+/)?.[0] || "$").trim() || "$";

    const stored = getStored() ?? "1";
    const finalTotal = stored === "1"
      ? (itemsTotal + PROTECTION_PRICE)
      : itemsTotal;

    totalEl.textContent = formatMoney(finalTotal, prefix);
  }

  // React-safe: force SOURCE to match stored using click when needed
  function forceSourceToStored(source, stored01) {
    const wantChecked = stored01 === "1";
    if (source.checked === wantChecked) return;

    syncing = true;
    source.click();
    syncing = false;
  }

  // LF-safe: force TARGET (real bump) to match stored using click when needed
  function forceTargetToStored(target, stored01) {
    const wantChecked = stored01 === "1";
    if (target.checked === wantChecked) return;

    syncing = true;
    target.click();
    syncing = false;
  }

  function bindAndSync() {
    const source = getSource();
    const target = getTarget();

    // If neither exists yet, still try homepage total (it might exist)
    // but only if homepage present
    updateHomepageCartNum();

    if (!source && !target) return;

    // Ensure storage exists
    let stored = getStored();
    if (stored === null) {
      if (source) setStoredFromBool(!!source.checked);
      else setStored01("1");
      stored = getStored();
    }

    // Enforce storage -> UI toggle + bump (when present)
    if (source) forceSourceToStored(source, stored);
    if (target) forceTargetToStored(target, stored);

    // After enforcing, update homepage number again (storage might have been initialized)
    updateHomepageCartNum();

    // Bind source change once (per mounted node)
    if (source && source.dataset.lfBound !== "1") {
      source.dataset.lfBound = "1";

      source.addEventListener("change", function () {
        if (syncing) return;

        const next01 = source.checked ? "1" : "0";
        setStored01(next01);

        // Homepage: update cart number based on new storage
        updateHomepageCartNum();

        // Non-homepage/cart: force bump to match
        const freshTarget = getTarget();
        if (freshTarget) forceTargetToStored(freshTarget, next01);
      });
    }
  }

  function delayedBindAndSync() {
    clearTimeout(timer);
    timer = setTimeout(bindAndSync, 180);
  }

  document.addEventListener("DOMContentLoaded", delayedBindAndSync);

  // When cart opens / UI changes happen after a click
  document.body.addEventListener("click", delayedBindAndSync, true);

  // Backup for re-renders
  const mo = new MutationObserver(delayedBindAndSync);
  mo.observe(document.body, { childList: true, subtree: true });

})();
</script>
