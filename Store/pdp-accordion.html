<style>
  .accordion-2-card {
    transition: all 0.3s ease;
  }

  /* hide content by default */
  .accordion-2-content {
    display: none;
  }

  /* show content when active */
  .accordion-2-card.accordion-2-active .accordion-2-content {
    display: block;
  }

  /* hide minus by default */
  .accordion-2-toggle .plus {
    pointer-events: none;
  }

  .accordion-2-toggle .minus {
    display: none;
    pointer-events: none;
  }

  /* when active: hide plus */
  .accordion-2-card.accordion-2-active .accordion-2-toggle .plus {
    display: none;
  }

  /* when active: show minus */
  .accordion-2-card.accordion-2-active .accordion-2-toggle .minus {
    display: inline-flex;
  }
</style>

<script>
(function () {

  document.addEventListener("click", function (e) {

    const toggle = e.target.closest(".accordion-2-toggle");
    if (!toggle) return;

    const card = toggle.closest(".accordion-2-card");
    if (!card) return;

    const container = card.parentElement;
    const cards = container.querySelectorAll(".accordion-2-card");
    const wasActive = card.classList.contains("accordion-2-active");

    requestAnimationFrame(function () {

      cards.forEach(function(c){
        c.classList.remove("accordion-2-active");
      });

      if (!wasActive) {
        card.classList.add("accordion-2-active");
      }

    });

  });

})();
</script>
