<style>
  /* Slides */
  .pdp-slider-vid-2 .swiper-slide {
    width: 215px !important;
    border-radius: 10px;
    overflow: hidden;
    position: relative;
  }

  /* Video */
  .pdp-slider-vid-2 .lf-hls-video-2 {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }

  /* Overlay Play Button */
  .pdp-slider-vid-2 .swiper-slide .play-button-pdp {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    z-index: 5;
    cursor: pointer;
    user-select: none;
  }

  /* Hide button when playing */
  .pdp-slider-vid-2 .swiper-slide .play-button-pdp[hidden] {
    display: none !important;
  }

  /* Pagination container */
  .pdp-slider-vid-pagination-2 {
    display: flex !important;
    justify-content: center !important;
    width: 50px !important;
  }

  /* Progress bar color */
  .pdp-slider-vid-pagination-2 .swiper-pagination-progressbar-fill {
    background-color: #A03F3F !important;
  }

  /* Responsive placeholders */
  @media (min-width: 1024px) {
    .pdp-slider-vid-pagination-2 {
      display: none !important;
    }
  }
</style>

<script>
  function initPdpSliderVid2() {
    const el = document.querySelector(".pdp-slider-vid-2");
    if (!el || el.classList.contains("swiper-initialized")) return;

    // eslint-disable-next-line no-undef
    const swiper2 = new Swiper(el, {
      speed: 400,
      spaceBetween: 9,
      slidesPerView: "auto",
      watchOverflow: true,
      loop: true,
      centerInsufficientSlides: true,
      centeredSlidesBounds: true,
      observer: true,
      observeParents: true,
      pagination: {
        el: ".pdp-slider-vid-pagination-2",
        type: "progressbar",
        clickable: true,
      },
      on: {
        slideChangeTransitionStart() {
          document
            .querySelectorAll(".pdp-slider-vid-2 video.lf-hls-video-2")
            .forEach((v) => {
              try {
                v.pause();
              } catch (e) {}
            });
        },
      },
    });

    el._pdpSwiper2 = swiper2;
  }

  document.addEventListener("DOMContentLoaded", function () {
    setTimeout(initPdpSliderVid2, 300);
  });

  const pdpSliderVid2Observer = new MutationObserver(function () {
    initPdpSliderVid2();
  });

  pdpSliderVid2Observer.observe(document.body, {
    childList: true,
    subtree: true,
  });
</script>

<script>
  (() => {
    // Skip Swiper loop-clone slides to reduce duplicated work
    const SLIDE_SELECTOR =
      ".pdp-slider-vid-2 .swiper-slide:not(.swiper-slide-duplicate)";

    const IFRAME_SELECTOR = "iframe";
    const VIDEO_CLASS = "lf-hls-video-2";
    const PROCESSED_ATTR = "data-hls-processed-2";
    const BTN_SELECTOR = ".play-button-pdp";

    let currentPlaying = null;

    const log = (...a) => console.log("[LF-HLS-2]", ...a);

    function isCloudflareStreamIframe(urlStr) {
      try {
        const u = new URL(urlStr, location.href);
        return (
          u.hostname.endsWith("cloudflarestream.com") &&
          u.pathname.includes("/iframe")
        );
      } catch {
        return false;
      }
    }

    function cloudflareToHls(urlStr) {
      const u = new URL(urlStr, location.href);
      const parts = u.pathname.split("/").filter(Boolean);
      const videoId = parts[0];
      return { videoId, hls: `${u.origin}/${videoId}/manifest/video.m3u8` };
    }

    function setControlsVisible(video, visible) {
      if (visible) video.setAttribute("controls", "");
      else video.removeAttribute("controls");
    }

    function showBtn(btn) {
      if (!btn) return;
      btn.hidden = false;
      btn.style.display = "";
      btn.style.pointerEvents = "auto";
      btn.style.opacity = "1";
    }

    function hideBtn(btn) {
      if (!btn) return;
      btn.hidden = true;
      btn.style.pointerEvents = "none";
      btn.style.opacity = "0";
    }

    function pauseOtherIfNeeded(video) {
      if (currentPlaying && currentPlaying !== video) {
        try {
          if (!currentPlaying.paused && !currentPlaying.ended) {
            currentPlaying.pause();
          }
        } catch (e) {}
      }
    }

    function wirePlayButton(slide, video) {
      const btn = slide.querySelector(BTN_SELECTOR);

      // Start muted for faster/smoother user-gesture play on mobile.
      // We unmute AFTER playback begins (still within user gesture path).
      video.muted = true;

      setControlsVisible(video, false);
      showBtn(btn);

      if (video.dataset.btnWired2 === "1") return;
      video.dataset.btnWired2 = "1";

      const playWithExclusivity = async () => {
        pauseOtherIfNeeded(video);
        try {
          await video.play();
        } catch (e) {
          log("play failed (gesture/autoplay?)", e);
        }
      };

      const toggle = async () => {
        try {
          if (video.paused || video.ended) {
            await playWithExclusivity();
          } else {
            video.pause();
          }
        } catch (e) {
          log("toggle failed", e);
        }
      };

      if (btn && btn.dataset.listenerAttached2 !== "1") {
        btn.addEventListener("click", (e) => {
          e.preventDefault();
          e.stopPropagation();
          toggle();
        });
        btn.dataset.listenerAttached2 = "1";
      }

      if (video.dataset.videoClickAttached2 !== "1") {
        video.addEventListener("click", () => {
          const controlsVisible = video.hasAttribute("controls");
          if (controlsVisible) return;
          toggle();
        });
        video.dataset.videoClickAttached2 = "1";
      }

      video.addEventListener("play", () => {
        pauseOtherIfNeeded(video);
        currentPlaying = video;

        // If playback successfully started, unmute
        // (some browsers may still keep it muted; that's fine)
        try {
          video.muted = false;
        } catch (e) {}

        hideBtn(slide.querySelector(BTN_SELECTOR));
        setControlsVisible(video, true);
      });

      video.addEventListener("pause", () => {
        showBtn(slide.querySelector(BTN_SELECTOR));
        setControlsVisible(video, false);

        // Return to muted state so next play is smooth
        video.muted = true;

        if (currentPlaying === video) currentPlaying = null;
      });

      video.addEventListener("ended", () => {
        showBtn(slide.querySelector(BTN_SELECTOR));
        setControlsVisible(video, false);

        video.muted = true;

        if (currentPlaying === video) currentPlaying = null;
      });

      const refreshUI = () => {
        const freshBtn = slide.querySelector(BTN_SELECTOR);
        if (video.paused || video.ended) {
          setControlsVisible(video, false);
          showBtn(freshBtn);
        } else {
          setControlsVisible(video, true);
          hideBtn(freshBtn);
        }
      };

      if (!video._btnObserver2) {
        const localObs = new MutationObserver(() => refreshUI());
        localObs.observe(slide, { childList: true, subtree: true });
        video._btnObserver2 = localObs;
      }

      refreshUI();
    }

    function initHls(videoEl, hlsUrl, videoId) {
      const canNative =
        videoEl.canPlayType("application/vnd.apple.mpegurl") ||
        videoEl.canPlayType("application/x-mpegURL");

      if (canNative) {
        videoEl.src = hlsUrl;
        return;
      }

      if (!window.Hls || !window.Hls.isSupported()) {
        log("Hls.js not supported in this browser.", videoEl);
        return;
      }

      // Avoid double-attaching HLS if LF re-renders
      if (videoEl._hlsInstance2) return;

      const hls = new Hls({
        enableWorker: true,
        lowLatencyMode: false,
      });

      hls.loadSource(hlsUrl);
      hls.attachMedia(videoEl);

      hls.on(Hls.Events.ERROR, (event, data) => {
        log("HLS error", { videoId, event, data });
      });

      videoEl._hlsInstance2 = hls;
    }

    function ensureVideoInSlide(slide, hlsUrl, videoId, placeholderIframe) {
      if (slide.getAttribute(PROCESSED_ATTR) === "1") return;

      let video = slide.querySelector(`video.${VIDEO_CLASS}`);
      if (!video) {
        video = document.createElement("video");
        video.className = VIDEO_CLASS;
        video.setAttribute("playsinline", "");
        video.setAttribute("preload", "metadata"); // keep light for all slides
        video.style.width = "100%";
        video.style.height = "100%";
        video.style.objectFit = "cover";
        // start muted (will unmute on play)
        video.muted = true;

        slide.prepend(video);
      }

      setControlsVisible(video, false);

      // Initialize HLS now (you can later optimize to only init on active slide)
      initHls(video, hlsUrl, videoId);

      // Keep iframe as visual placeholder until the video has a frame
      if (placeholderIframe && !video.dataset.iframeSwapAttached2) {
        video.dataset.iframeSwapAttached2 = "1";

        const swap = () => {
          try {
            placeholderIframe.style.display = "none";
            setTimeout(() => {
              try {
                placeholderIframe.remove();
              } catch (e) {}
            }, 250);
          } catch (e) {}
        };

        // When the browser has decoded enough to show first frame
        video.addEventListener("loadeddata", swap, { once: true });

        // Safety: if loadeddata doesn't fire (network issues), don't keep forever
        setTimeout(() => {
          if (
            placeholderIframe.isConnected &&
            (video.readyState >= 2 || video.currentTime > 0)
          ) {
            swap();
          }
        }, 4000);
      }

      wirePlayButton(slide, video);

      slide.setAttribute(PROCESSED_ATTR, "1");
    }

    // Debounced processing to reduce expensive rescans
    let rafId = 0;
    function scheduleProcess(root) {
      if (rafId) return;
      rafId = requestAnimationFrame(() => {
        rafId = 0;
        processSlides(root || document);
      });
    }

    function processSlides(root = document) {
      const slides = root.querySelectorAll(SLIDE_SELECTOR);
      if (!slides.length) return;

      slides.forEach((slide) => {
        // If already processed, just re-wire button in case LF re-rendered it
        if (slide.getAttribute(PROCESSED_ATTR) === "1") {
          const video = slide.querySelector(`video.${VIDEO_CLASS}`);
          if (video) wirePlayButton(slide, video);
          return;
        }

        const iframe = slide.querySelector(IFRAME_SELECTOR);
        if (!iframe) return;

        const src = iframe.getAttribute("src") || "";
        if (!isCloudflareStreamIframe(src)) return;

        const { videoId, hls } = cloudflareToHls(src);

        // IMPORTANT: do NOT hide/remove iframe yet — keep as placeholder
        ensureVideoInSlide(slide, hls, videoId, iframe);
      });
    }

    if (document.readyState === "loading") {
      document.addEventListener("DOMContentLoaded", () => processSlides());
    } else {
      processSlides();
    }

    const obs = new MutationObserver((mutations) => {
      for (const m of mutations) {
        for (const n of m.addedNodes) {
          if (n.nodeType === 1) {
            // Only process within the newly added subtree (faster)
            scheduleProcess(n);
          }
        }
      }
    });

    obs.observe(document.documentElement, { childList: true, subtree: true });

    log("Observer attached");
  })();
</script>
