(function () {
  function ensureMainLandmark() {
    const root = document.getElementById("root");
    if (!root) return;

    if (root.querySelector('main, [role="main"]')) return;

    const firstElement = Array.from(root.children).find(
      (el) => el.tagName !== "SCRIPT" && el.tagName !== "STYLE"

  }

})();
